<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>新民國小 - 成績合併工具</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-8">
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        function App() {
            const [files, setFiles] = useState([]);
            const [processing, setProcessing] = useState(false);

            const handleFileChange = (e) => setFiles(Array.from(e.target.files));

            const processFiles = async () => {
                setProcessing(true);
                let allData = [];

                for (let file of files) {
                    const text = await file.text();
                    const lines = text.split('\n');
                    let currentTerm = "未知";
                    let headers = [];

                    lines.forEach(line => {
                        const cols = line.split(',').map(c => c.trim());
                        if (cols.length < 2) return;

                        // 偵測學期 (e.g., 1-1-1)
                        if (/^\d-\d-\d/.test(cols[0])) {
                            currentTerm = cols[0];
                            return;
                        }

                        // 偵測標題
                        if (cols.includes('姓名') && cols.includes('座號')) {
                            headers = cols;
                            return;
                        }

                        // 擷取資料
                        if (headers.length > 0 && cols[0] && !isNaN(cols[0])) {
                            let obj = { 班級: file.name.replace('.csv', ''), 學期: currentTerm };
                            headers.forEach((h, i) => obj[h] = cols[i]);
                            allData.push(obj);
                        }
                    });
                }

                // 匯出 Excel
                const ws = XLSX.utils.json_to_sheet(allData);
                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, "成績總表");
                XLSX.writeFile(wb, "學生成績總表.xlsx");
                setProcessing(false);
            };

            return (
                <div className="max-w-2xl mx-auto bg-white p-6 rounded-xl shadow-lg">
                    <h1 className="text-2xl font-bold mb-4">成績合併工具</h1>
                    <input type="file" multiple onChange={handleFileChange} className="mb-4 block w-full" />
                    <button 
                        onClick={processFiles}
                        disabled={files.length === 0 || processing}
                        className="bg-blue-600 text-white px-6 py-2 rounded hover:bg-blue-700 disabled:bg-gray-400"
                    >
                        {processing ? '處理中...' : '開始合併成 Excel'}
                    </button>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
